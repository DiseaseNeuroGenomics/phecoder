site_name: phecoder
site_url: https://diseaseneurogenomics.github.io/phecoder/
repo_url: https://github.com/DiseaseNeuroGenomics/phecoder
repo_name: DiseaseNeuroGenomics/phecoder
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.instant
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: false
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - Usage Guide: guide.md
  - Review & Export: review.md
  - API Reference:
      - Phecoder: api/phecoder.md
      - Review & Export: api/review.md
      - Utilities: api/utils.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.details
  - toc:
      permalink: true
